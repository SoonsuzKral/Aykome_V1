services:
  oracle:
    image: gvenzl/oracle-free:slim
    container_name: aykome-v6-oracle
    ports:
      - "1521:1521"
    environment:
      ORACLE_PASSWORD: aykome123
      APP_USER: aykome_user
      APP_USER_PASSWORD: aykome123
    volumes:
      - oracle_data:/opt/oracle/oradata
    healthcheck:
      test: ["CMD", "sqlplus", "-s", "aykome_user/aykome123@FREEPDB1", "SELECT 1 FROM DUAL"]
      interval: 30s
      timeout: 10s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: aykome-v6-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: ["redis-server", "--appendonly", "yes"]

  adminer:
    build:
      context: ./docker/adminer
      dockerfile: Dockerfile
    container_name: aykome-v6-adminer
    ports:
      - "8080:8080"
    depends_on:
      oracle:
        condition: service_healthy

  php:
    build:
      context: ./docker/php
      dockerfile: Dockerfile
    image: aykome-v6-php
    container_name: aykome-v6-php
    working_dir: /app
    volumes:
      - .:/app
    depends_on:
      oracle:
        condition: service_healthy
      redis:
        condition: service_started
    stdin_open: true
    tty: true

  serve:
    image: aykome-v6-php
    container_name: aykome-v6-serve
    working_dir: /app
    volumes:
      - .:/app
    ports:
      - "8001:8000"
    depends_on:
      oracle:
        condition: service_healthy
      redis:
        condition: service_started
    command: php artisan serve --host=0.0.0.0 --port=8000
    environment:
      DB_CONNECTION: oracle
      DB_HOST: oracle
      DB_PORT: 1521
      DB_DATABASE: FREEPDB1
      DB_USERNAME: aykome_user
      DB_PASSWORD: aykome123
      REDIS_HOST: redis
      REDIS_PORT: 6379

  reverb:
    image: aykome-v6-php
    container_name: aykome-v6-reverb
    working_dir: /app
    volumes:
      - .:/app
    ports:
      - "8090:8090"
    depends_on:
      oracle:
        condition: service_healthy
      redis:
        condition: service_started
    command: php artisan reverb:start --host=0.0.0.0 --port=8090
    environment:
      DB_CONNECTION: oracle
      DB_HOST: oracle
      DB_PORT: 1521
      DB_DATABASE: FREEPDB1
      DB_USERNAME: aykome_user
      DB_PASSWORD: aykome123
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REVERB_HOST: 0.0.0.0
      REVERB_PORT: 8090
      REVERB_SCHEME: http

volumes:
  oracle_data:
  redis_data:
