services:
  oracle:
    image: gvenzl/oracle-free:slim
    container_name: aykome-v6-oracle
    expose:
      - "1521"
    environment:
      ORACLE_PASSWORD: aykome123
      APP_USER: aykome_user
      APP_USER_PASSWORD: aykome123
    volumes:
      - oracle_data:/opt/oracle/oradata
    healthcheck:
      test: ["CMD", "sqlplus", "-s", "aykome_user/aykome123@FREEPDB1", "SELECT 1 FROM DUAL"]
      interval: 30s
      timeout: 10s
      retries: 10

  adminer:
    build:
      context: ./docker/adminer
      dockerfile: Dockerfile
    container_name: aykome-v6-adminer
    expose:
      - "8080"
    depends_on:
      oracle:
        condition: service_healthy

  php-oci8:
    build:
      context: ./docker/php
      dockerfile: Dockerfile
    container_name: aykome-v6-php
    working_dir: /app
    volumes:
      - .:/app
    depends_on:
      oracle:
        condition: service_healthy
    command: ["sleep", "infinity"]

  redis:
    image: redis:7-alpine
    container_name: aykome-v6-redis
    expose:
      - "6379"
    volumes:
      - redis_data:/data
    command: ["redis-server", "--appendonly", "yes"]

  serve:
    build:
      context: ./docker/php
      dockerfile: Dockerfile
    container_name: aykome-v6-serve
    working_dir: /app
    volumes:
      - .:/app
    depends_on:
      oracle:
        condition: service_healthy
      php-oci8:
        condition: service_started
      redis:
        condition: service_started
    expose:
      - "8001"
    command: ["php", "artisan", "serve", "--host=0.0.0.0", "--port=8001"]

  reverb:
    build:
      context: ./docker/php
      dockerfile: Dockerfile
    container_name: aykome-v6-reverb
    working_dir: /app
    volumes:
      - .:/app
    depends_on:
      oracle:
        condition: service_healthy
      redis:
        condition: service_started
    expose:
      - "8090"
    command: ["php", "artisan", "reverb:start", "--host=0.0.0.0", "--port=8090"]

  caddy:
    image: caddy:2
    container_name: aykome-v6-caddy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/caddy/Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
    depends_on:
      - serve

volumes:
  oracle_data:
  redis_data:
  caddy_data:
